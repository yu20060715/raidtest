; RAIDTEST Sample Configuration
; Copy this to the same directory as raidtest.exe and rename to raidtest.ini

[general]
mount_letter = G
cache_mb = 1024
auto_scan = true

[disks]
; Pool files: disk_id:size_mb
; 0 = first physical disk, 1 = second, etc.
; Size 0 = use full disk capacity
pool_0 = 0:10240
pool_1 = 1:10240

[volume]
; Can be: raid0, raid1
type = raid0

[logging]
event_log_file = raidtest_events.log
max_log_lines = 500
